apiVersion: apps/v1
kind: Deployment
metadata:
  name: rest-b
  labels:
    app: rest-b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rest-b
  template:
    metadata:
      labels:
        app: rest-b
    spec:
      containers:
        - name: rest-b
          image: modulo-b:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "rest_server:app", "--host", "0.0.0.0", "--port", "8002"]
          ports:
            - containerPort: 8002
